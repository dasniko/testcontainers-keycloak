name: Deploy Snapshot to Maven Central

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerTest"
          - shard: 2
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerHttpsTest"
          - shard: 3
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerHttpsLegacyTest,dasniko.testcontainers.keycloak.KeycloakContainerOptimizedTest"
          - shard: 4
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerExtensionTest,dasniko.testcontainers.keycloak.KeycloakContainerExtensionReuseTest,dasniko.testcontainers.keycloak.KeycloakContainerEndpointHelpersTest,dasniko.testcontainers.keycloak.KeycloakContainerTokenHelpersTest"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Determine Keycloak version
        id: kc-version
        run: |
          KEYCLOAK_VERSION=$(grep -oPm1 "(?<=<keycloak.version>)[^<]+" pom.xml)
          if [ "$KEYCLOAK_VERSION" = "999.0.0-SNAPSHOT" ]; then
            KEYCLOAK_VERSION=nightly
          fi
          echo "version=$KEYCLOAK_VERSION" >> "$GITHUB_OUTPUT"
      - name: Run tests (Shard ${{ matrix.shard }})
        run: |
          mvn test -Dtest="${{ matrix.classes }}" \
                   -Dsurefire.failIfNoSpecifiedTests=false \
                   -Dkc.version=${{ steps.kc-version.outputs.version }}

  deploy-snapshot:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Deploy snapshot to Maven Central
        run: mvn -B clean deploy -DskipTests=true
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
