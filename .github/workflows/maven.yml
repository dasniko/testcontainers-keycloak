# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: CI build

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feature/**'
    paths-ignore:
      - '.github/**'
      - 'pom.xml'
      - 'README.md'
  pull_request:
    paths-ignore:
      - '.github/**'
      - 'README.md'
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        keycloak-version: ['25.0', '26.4', 'latest', 'nightly']
        shard: [1, 2, 3, 4]
        include:
          - shard: 1
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerTest"
          - shard: 2
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerHttpsTest"
          - shard: 3
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerHttpsLegacyTest,dasniko.testcontainers.keycloak.KeycloakContainerOptimizedTest"
          - shard: 4
            classes: "dasniko.testcontainers.keycloak.KeycloakContainerExtensionTest,dasniko.testcontainers.keycloak.KeycloakContainerExtensionReuseTest"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests (Shard ${{ matrix.shard }}, Keycloak ${{ matrix.keycloak-version }})
        run: |
          mvn test -Dtest="${{ matrix.classes }}" \
                   -Dkc.version="${{ matrix.keycloak-version }}" \
                   -Dsurefire.failIfNoSpecifiedTests=false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Maven build
        run: mvn -B package -DskipTests
